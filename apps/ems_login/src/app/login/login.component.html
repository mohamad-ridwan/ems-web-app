<div class="login-container d-flex align-items-center justify-content-center bg-light" style="min-height: 100vh;">
  <div class="login-card shadow-lg p-5 bg-white rounded-4 border-0" style="max-width: 450px; width: 100%;">
    <div class="text-center mb-5">
      <h2 class="fw-bold text-primary display-6">EMS <span class="text-gold">Portal</span></h2>
      <p class="text-muted small text-uppercase tracking-wider">Enterprise Management System</p>
    </div>

    <form (ngSubmit)="onLogin()" #loginForm="ngForm">
      <div class="mb-4">
        <label for="username" class="form-label text-muted small fw-bold">USERNAME</label>
        <div class="input-group">
          <span class="input-group-text bg-white border-end-0"><i class="bi bi-person text-primary"></i></span>
          <input type="text" class="form-control border-start-0" id="username" name="username" [(ngModel)]="loginData.username" required placeholder="Masukkan username">
        </div>
      </div>

      <div class="mb-4">
        <label for="password" class="form-label text-muted small fw-bold">PASSWORD</label>
        <div class="input-group">
          <span class="input-group-text bg-white border-end-0"><i class="bi bi-lock text-primary"></i></span>
          <input [type]="showPassword() ? 'text' : 'password'" class="form-control border-start-0 border-end-0" id="password" name="password" [(ngModel)]="loginData.password" required placeholder="Masukkan password">
          <span class="input-group-text bg-white border-start-0 cursor-pointer" (click)="showPassword.set(!showPassword())" style="cursor: pointer;">
            <i class="bi text-primary" [ngClass]="showPassword() ? 'bi-eye' : 'bi-eye-slash'"></i>
          </span>
        </div>
      </div>

      <div *ngIf="errorMessage()" class="alert alert-danger small py-2 border-0 rounded-3 mb-4">
        <i class="bi bi-exclamation-triangle-fill me-2"></i> {{ errorMessage() }}
      </div>

      <button type="submit" class="btn btn-primary w-100 fw-bold shadow-sm" [disabled]="!loginForm.form.valid || isLoading()">
        <span *ngIf="isLoading()" class="spinner-border spinner-border-sm me-2"></span>
        MASUK
      </button>

      <div class="text-center mt-4">
        <a href="#" class="text-primary text-decoration-none small fw-bold">Lupa Password?</a>
      </div>
    </form>
  </div>
</div>
