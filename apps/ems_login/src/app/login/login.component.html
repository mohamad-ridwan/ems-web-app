<div class="login-container d-flex align-items-center justify-content-center">
  <div class="login-card shadow-lg p-4 bg-white rounded-4">
    <div class="text-center mb-4">
      <h2 class="fw-bold text-primary-mandiri">EMS <span class="text-gold-mandiri">Portal</span></h2>
      <p class="text-muted">Enterprise Management System</p>
    </div>

    <form (ngSubmit)="onLogin()" #loginForm="ngForm">
      <div class="mb-3">
        <label for="username" class="form-label text-secondary small fw-semibold">USERNAME</label>
        <div class="input-group">
          <span class="input-group-text bg-light border-0"><i class="bi bi-person text-primary-mandiri"></i></span>
          <input type="text" class="form-control bg-light border-0" id="username" name="username" [(ngModel)]="loginData.username" required placeholder="Masukkan username">
        </div>
      </div>

      <div class="mb-4">
        <label for="password" class="form-label text-secondary small fw-semibold">PASSWORD</label>
        <div class="input-group">
          <span class="input-group-text bg-light border-0"><i class="bi bi-lock text-primary-mandiri"></i></span>
          <input type="password" class="form-control bg-light border-0" id="password" name="password" [(ngModel)]="loginData.password" required placeholder="Masukkan password">
        </div>
      </div>

      <div *ngIf="errorMessage" class="alert alert-danger small py-2 border-0 rounded-3 mb-3">
        {{ errorMessage }}
      </div>

      <button type="submit" class="btn btn-primary-mandiri w-100 py-2 rounded-3 fw-bold shadow-sm" [disabled]="!loginForm.form.valid || isLoading">
        <span *ngIf="isLoading" class="spinner-border spinner-border-sm me-2"></span>
        MASUK
      </button>

      <div class="text-center mt-4">
        <a href="#" class="text-primary-mandiri text-decoration-none small fw-semibold">Lupa Password?</a>
      </div>
    </form>
  </div>
</div>
