<ems-sidebar
  [pageTitle]="pageTitle()"
  [user]="vm.user()"
  [isLoginPage]="isLoginPage()"
  (logout)="vm.logout()"
>
  <router-outlet></router-outlet>
</ems-sidebar>

@if (notificationService.notification(); as currentNotification) {
  <ems-popup-notification
    [type]="currentNotification.type"
    [title]="currentNotification.title || ''"
    [message]="currentNotification.message"
    [duration]="currentNotification.duration ?? 4000"
    (close)="notificationService.clearNotification()"
  ></ems-popup-notification>
}
