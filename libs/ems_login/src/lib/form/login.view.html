<div
  class="login-container d-flex align-items-center justify-content-center bg-light"
  style="min-height: 100vh"
>
  <div
    class="login-card shadow-lg p-5 bg-white rounded-4 border-0"
    style="max-width: 450px; width: 100%"
  >
    <div class="text-center mb-5">
      <h2 class="fw-bold text-primary display-6">
        EMS <span class="text-gold">Portal</span>
      </h2>
      <p class="text-muted small text-uppercase tracking-wider">
        Enterprise Management System
      </p>
    </div>

    <form (ngSubmit)="facade.onLogin()" #loginForm="ngForm">
      <div class="mb-4">
        <label for="username" class="form-label">USERNAME</label>
        <div class="input-group">
          <span class="input-group-text bg-white border-end-0"
            ><i class="bi bi-person text-primary"></i
          ></span>
          <input
            type="text"
            class="form-control border-start-0"
            id="username"
            name="username"
            [(ngModel)]="facade.loginData.username"
            required
            placeholder="Masukkan username"
          />
        </div>
      </div>

      <div class="mb-4">
        <label for="password" class="form-label">PASSWORD</label>
        <div class="input-group">
          <span class="input-group-text bg-white border-end-0"
            ><i class="bi bi-lock text-primary"></i
          ></span>
          <input
            [type]="facade.showPassword() ? 'text' : 'password'"
            class="form-control border-start-0 border-end-0"
            id="password"
            name="password"
            [(ngModel)]="facade.loginData.password"
            required
            placeholder="Masukkan password"
          />
          <button
            type="button"
            class="input-group-text bg-white border-start-0 cursor-pointer"
            (click)="facade.showPassword.set(!facade.showPassword())"
            aria-label="Toggle Password Visibility"
            style="
              cursor: pointer;
              border: 1px solid #dee2e6;
              border-left: none;
            "
          >
            <i
              class="bi text-primary"
              [ngClass]="facade.showPassword() ? 'bi-eye' : 'bi-eye-slash'"
            ></i>
          </button>
        </div>
      </div>

      @if (facade.errorMessage()) {
      <ems-notification
        type="danger"
        [message]="facade.errorMessage()!"
        [dismissible]="false"
        styleClass="mb-4 py-2 small"
      >
      </ems-notification>
      }

      <ems-button
        type="submit"
        label="MASUK"
        variant="primary"
        class="w-100 d-block"
        styleClass="w-100 fw-bold shadow-sm"
        [disabled]="!loginForm.form.valid || facade.isLoading()"
        [isLoading]="facade.isLoading()"
        loadingText="MASUK..."
      >
      </ems-button>

      <div class="text-center mt-4">
        <a href="#" class="text-primary text-decoration-none small fw-bold"
          >Lupa Password?</a
        >
      </div>
    </form>
  </div>
</div>
